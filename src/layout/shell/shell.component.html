<div class="ccd-shell" [class.sidebar-open]="layout.isSidebarOpen()">
  <button
    type="button"
    class="ccd-shell__backdrop"
    aria-label="Close navigation menu"
    (click)="layout.closeSidebar()"
  ></button>

  <ccd-sidebar class="ccd-shell__sidebar" />

  <div class="ccd-main">
    <ccd-topbar />

    <main class="ccd-content" id="main-content" tabindex="-1">
      <div class="ccd-page">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
